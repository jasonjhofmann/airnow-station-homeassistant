# Integration Quality Scale self-assessment (custom integration — not
# officially scored; tracked against the core checklist, audited 2026-06-09).
rules:
  # Bronze
  action-setup:
    status: exempt
    comment: No custom service actions.
  appropriate-polling:
    status: done
    comment: 15-minute coordinator interval against hourly-published data.
  brands:
    status: done
    comment: In-tree brand assets (custom_components/airnow_station/brand/,
      original artwork, generated by scripts/generate_brand.py); central
      brands PRs auto-close for custom integrations.
  common-modules:
    status: done
    comment: coordinator.py + entity.py (AirNowStationEntity base).
  config-flow:
    status: done
  config-flow-test-coverage:
    status: done
    comment: User, subentry, and reauth flows tested (happy paths, errors,
      recovery, duplicates).
  dependency-transparency:
    status: done
    comment: pyairnow, pinned, on PyPI, OSS.
  docs-actions:
    status: exempt
    comment: No custom service actions.
  docs-high-level-description:
    status: done
    comment: README "Why not the core AirNow integration" section.
  docs-installation-instructions:
    status: done
    comment: README HACS custom-repository steps.
  docs-removal-instructions:
    status: done
    comment: README Removal section (per-station subentry + full removal).
  entity-event-setup:
    status: exempt
    comment: No event subscriptions.
  entity-unique-id:
    status: done
    comment: "{aqs_code}-{description_key}."
  has-entity-name:
    status: done
  runtime-data:
    status: done
    comment: entry.runtime_data holds the per-subentry coordinator map.
  test-before-configure:
    status: done
    comment: API key validated by live discovery query in the flow.
  test-before-setup:
    status: done
    comment: async_config_entry_first_refresh per station subentry.
  unique-config-entry:
    status: done
    comment: _async_abort_entries_match on API key; subentry unique_id = AQS code.

  # Silver
  action-exceptions:
    status: exempt
    comment: No custom service actions.
  config-entry-unloading:
    status: done
  docs-configuration-parameters:
    status: done
    comment: README Options section states there is no options flow and
      documents fixed polling.
  docs-installation-parameters:
    status: done
    comment: README Parameters table (API key, search coordinates, station picker).
  entity-unavailable:
    status: done
    comment: Coordinator-driven plus per-parameter availability override.
  integration-owner:
    status: done
  log-when-unavailable:
    status: done
    comment: DataUpdateCoordinator built-in once-per-transition logging.
  parallel-updates:
    status: done
    comment: PARALLEL_UPDATES = 0 in sensor.py.
  reauthentication-flow:
    status: done
  test-coverage:
    status: done
    comment: 100% line coverage (32 tests); CI enforces --cov-fail-under=95.

  # Gold
  devices:
    status: done
    comment: One service device per station subentry.
  diagnostics:
    status: done
    comment: diagnostics.py - API key redacted; per-station subentry data,
      last_update_success, and latest rows included.
  discovery:
    status: exempt
    comment: Cloud service; stations are not locally discoverable.
  discovery-update-info:
    status: exempt
    comment: No discovery.
  docs-data-update:
    status: done
    comment: README documents hourly cadence, 15-minute polling, -999 sentinels.
  docs-examples:
    status: done
    comment: README Examples (ozone-threshold automation, unhealthy-AQI
      template binary sensor).
  docs-known-limitations:
    status: done
    comment: README Known limitations (publication lag, CO AQI sentinels,
      ppb device-class constraint, parameter changes, rate limits).
  docs-supported-devices:
    status: done
    comment: README Supported stations section.
  docs-supported-functions:
    status: done
    comment: README entities table.
  docs-troubleshooting:
    status: done
    comment: README Troubleshooting section.
  docs-use-cases:
    status: done
    comment: Covered by the why-section; revisit when examples land.
  dynamic-devices:
    status: exempt
    comment: Stations are added intentionally via subentry flow, not auto-discovered.
  entity-category:
    status: done
    comment: All entities are primary measurements; no config/diagnostic entities.
  entity-device-class:
    status: done
    comment: Applied where HA units permit (PM2.5/PM10/CO/AQI); ozone/NO2/SO2
      report ppb which the matching device classes reject.
  entity-disabled-by-default:
    status: done
    comment: Small per-station entity set; nothing noisy enough to pre-disable.
  entity-translations:
    status: done
  exception-translations:
    status: done
    comment: Coordinator raises translation-keyed errors (invalid_api_key,
      no_station_data, api_error); exceptions section in strings.json.
  icon-translations:
    status: done
  reconfiguration-flow:
    status: done
    comment: Account-level reconfigure updates the API key. Station subentries
      are intentionally not reconfigurable - a station IS its AQS code
      (unique_id); changing station = remove + add.
  repair-issues:
    status: exempt
    comment: No repairable scenarios beyond reauth (which HA surfaces itself).
  stale-devices:
    status: done
    comment: Devices exist only per explicit subentry; subentry removal cleans
      up the device and entities via config_subentry_id binding.

  # Platinum
  async-dependency:
    status: done
    comment: pyairnow is asyncio/aiohttp.
  inject-websession:
    status: done
    comment: Home Assistant clientsession injected into AirNowDataAPI.
  strict-typing:
    status: done
    comment: mypy --strict clean (CI-enforced); pyairnow ships py.typed.

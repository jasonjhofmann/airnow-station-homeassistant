name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "17 6 * * 1"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_test.txt
      - run: pytest tests -q --cov=custom_components.airnow_station --cov-fail-under=95
      - run: mypy --strict custom_components/airnow_station/
      - run: ruff check custom_components tests scripts
